<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALma | Premium Streaming</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0d0d11; color: #f3f4f6; font-family: system-ui, sans-serif; }
        .premium-glow:hover { box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="border-b border-gray-800 bg-black/40 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <h1 onclick="showPage('home')" class="text-2xl font-extrabold tracking-wider text-red-500 cursor-pointer select-none">ALma</h1>
        <div class="flex items-center gap-4">
            <button onclick="showPage('home')" class="text-sm font-medium hover:text-red-500 transition">Browse</button>
            <button onclick="showPage('admin')" class="bg-gray-900 border border-gray-700 hover:border-red-500 text-xs px-3 py-1.5 rounded-md transition">Admin Portal</button>
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-8">
        
        <section id="page-home" class="page-view">
            <h2 class="text-xl font-bold mb-6 text-gray-300 tracking-wide">Trending Content</h2>
            <div id="video-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <div class="text-gray-500 animate-pulse text-center col-span-full py-12">Loading collection...</div>
            </div>
        </section>

        <section id="page-player" class="page-view hidden max-w-4xl mx-auto">
            <button onclick="showPage('home')" class="mb-4 text-sm text-gray-400 hover:text-white flex items-center gap-2">
                ← Back to Browse
            </button>
            <div class="relative w-full aspect-video bg-black rounded-xl overflow-hidden border border-gray-800 shadow-2xl">
                <iframe id="main-player" 
                        class="absolute top-0 left-0 w-full h-full"
                        src="" 
                        frameborder="0" 
                        allowfullscreen
                        sandbox="allow-scripts allow-same-origin allow-popups-to-escape-sandbox">
                </iframe>
            </div>
            <div class="mt-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div>
                    <h2 id="player-title" class="text-2xl font-bold text-white">Video Title</h2>
                    <p id="player-views" class="text-sm text-gray-400 mt-1">0 views</p>
                </div>
                <button id="share-btn" class="bg-red-600 hover:bg-red-700 text-white font-semibold px-6 py-2.5 rounded-lg shadow-lg flex items-center gap-2 transition active:scale-95">
                    Share Link
                </button>
            </div>
        </section>

        <section id="page-admin" class="page-view hidden max-w-md mx-auto">
            <div id="admin-auth" class="bg-gray-900 p-6 rounded-xl border border-gray-800">
                <h2 class="text-xl font-bold mb-4 text-white">Admin Authentication</h2>
                <p class="text-xs text-gray-400 mb-4">Enter your verified administrator credentials to continue.</p>
                <form id="login-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Email Address</label>
                        <input type="email" id="auth-email" required class="w-full bg-black border border-gray-700 rounded p-2.5 text-sm focus:border-red-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Password</label>
                        <input type="password" id="auth-password" required class="w-full bg-black border border-gray-700 rounded p-2.5 text-sm focus:border-red-500 outline-none">
                    </div>
                    <button type="submit" class="w-full bg-red-600 hover:bg-red-700 font-bold py-2.5 rounded transition">Access Console</button>
                </form>
            </div>

            <div id="admin-panel" class="bg-gray-900 p-6 rounded-xl border border-gray-800 hidden space-y-6">
                <div class="flex justify-between items-center border-b border-gray-800 pb-3">
                    <h2 class="text-xl font-bold text-white">Publish Content</h2>
                    <button onclick="handleLogout()" class="text-xs text-gray-400 hover:text-red-400">Sign Out</button>
                </div>
                <form id="upload-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Video Title</label>
                        <input type="text" id="up-title" required class="w-full bg-black border border-gray-700 rounded p-2.5 text-sm focus:border-red-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Thumbnail Image URL</label>
                        <input type="url" id="up-thumb" required placeholder="https://..." class="w-full bg-black border border-gray-700 rounded p-2.5 text-sm focus:border-red-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-gray-400 mb-1">Third-Party Embedded Video Link / URL</label>
                        <input type="url" id="up-embed" required placeholder="https://..." class="w-full bg-black border border-gray-700 rounded p-2.5 text-sm focus:border-red-500 outline-none">
                    </div>
                    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 font-bold py-2.5 rounded transition">Publish & Sync Live</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="border-t border-gray-900 bg-black/60 text-center py-4 text-xs text-gray-600">
        &copy; 2026 ALma. All rights reserved. Built for raw performance.
    </footer>

    <script>
        // --- 1. CONFIGURATION ---
        // Replace these parameters with your exact project details from Supabase -> Project Settings -> API
        const SUPABASE_URL = "YOUR_SUPABASE_PROJECT_URL"; 
        const SUPABASE_KEY = "YOUR_SUPABASE_ANON_PUBLIC_KEY";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let activeVideo = null;

        // --- 2. ROUTING CONTROLLER ---
        function showPage(pageId) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            // Unload iframe when leaving player view to cut off bandwidth/background processes
            if(pageId !== 'player') {
                document.getElementById('main-player').src = "";
            }
        }

        // --- 3. FETCH & DISPLAY HOMEPAGE CONTENT ---
        async function loadContentGrid() {
            const gridContainer = document.getElementById('video-grid');
            
            const { data: videos, error } = await supabase
                .from('videos')
                .select('*')
                .order('created_at', { ascending: false });

            if (error || !videos || videos.length === 0) {
                gridContainer.innerHTML = `<div class="text-gray-500 text-center col-span-full py-12">No media content found in database.</div>`;
                return;
            }

            gridContainer.innerHTML = "";
            videos.forEach(video => {
                const card = document.createElement('div');
                card.className = "bg-gray-900/50 rounded-lg overflow-hidden border border-gray-800 cursor-pointer premium-glow transition duration-300 flex flex-col group";
                card.onclick = () => launchPlayerView(video);
                
                card.innerHTML = `
                    <div class="relative aspect-video w-full bg-black overflow-hidden">
                        <img src="${video.thumbnail_url}" alt="" loading="lazy" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                    </div>
                    <div class="p-3.5 flex-grow flex flex-col justify-between">
                        <h3 class="font-semibold text-sm line-clamp-2 text-gray-200 group-hover:text-red-400 transition mb-2">${video.title}</h3>
                        <p class="text-xs text-gray-400 font-medium">${Number(video.view_count || 0).toLocaleString()} viewers watched</p>
                    </div>
                `;
                gridContainer.appendChild(card);
            });
        }

        // --- 4. SECURE PLAYER WITH HTML5 SANDBOX SHIELD ---
        async function launchPlayerView(video) {
            activeVideo = video;
            showPage('player');
            
            // Set fields instantly
            document.getElementById('player-title').innerText = video.title;
            document.getElementById('player-views').innerText = `${Number(video.view_count + 1).toLocaleString()} viewers watched`;
            
            // Establish target embed inside the sandboxed container
            document.getElementById('main-player').src = video.embed_url;

            // Fire and forget: Atomic background increment execution inside database 
            await supabase.rpc('increment_view', { video_id: video.id });
        }

        // --- 5. SOCIAL SHARING GENERATOR ---
        document.getElementById('share-btn').onclick = () => {
            if(!activeVideo) return;
            
            // Construct copy text string structured cleanly for direct messaging channels
            const baseAppUrl = window.location.origin + window.location.pathname;
            const textToCopy = `🔥 Watch "${activeVideo.title}" on ALma:\n${baseAppUrl}?v=${activeVideo.id}`;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = document.getElementById('share-btn').innerText;
                document.getElementById('share-btn').innerText = "Copied to Clipboard!";
                document.getElementById('share-btn').classList.replace('bg-red-600', 'bg-green-600');
                
                setTimeout(() => {
                    document.getElementById('share-btn').innerText = originalText;
                    document.getElementById('share-btn').classList.replace('bg-green-600', 'bg-red-600');
                }, 2000);
            });
        };

        // --- 6. AUTHENTICATION & MANAGEMENT PANEL ---
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                document.getElementById('admin-auth').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
            } else {
                document.getElementById('admin-auth').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
            }
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;

            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                alert(`Authentication Denied: ${error.message}`);
            } else {
                checkSession();
            }
        };

        async function handleLogout() {
            await supabase.auth.signOut();
            checkSession();
        }

        // --- 7. DATA PUBLISHING INTERFACE ---
        document.getElementById('upload-form').onsubmit = async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('up-title').value;
            const thumbnail_url = document.getElementById('up-thumb').value;
            const embed_url = document.getElementById('up-embed').value;

            const { error } = await supabase.from('videos').insert([{ title, thumbnail_url, embed_url, view_count: 0 }]);

            if (error) {
                alert(`Publish Error: ${error.message}`);
            } else {
                alert('Content pushed instantly to live database catalog!');
                document.getElementById('upload-form').reset();
                loadContentGrid();
                showPage('home');
            }
        };

        // --- 8. INITIALIZE ROUTING RESOLVER ---
        window.onload = async () => {
            await loadContentGrid();
            checkSession();

            // Native Deep linking handler logic for custom shared URLs
            const urlParams = new URLSearchParams(window.location.search);
            const videoParamId = urlParams.get('v');
            if (videoParamId) {
                const { data, error } = await supabase.from('videos').select('*').eq('id', videoParamId).single();
                if (data && !error) {
                    launchPlayerView(data);
                }
            }
        };
    </script>
</body>
</html>
