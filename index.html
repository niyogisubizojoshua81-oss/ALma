<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALma - Real Estate Advertising</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="app-header">
        <div class="logo-container">
            <span class="brand-logo"><i class="fa-solid(remove-space)-house-chimney-crack"></i> ALma</span>
            <span class="tagline">Find Your Next Home Instantly</span>
        </div>
        <div class="admin-badge"><i class="fa-solid(remove-space)-user-shield"></i> Admin View</div>
    </header>

    <section class="filter-panel">
        <div class="search-box">
            <i class="fa-solid(remove-space)-magnifying-glass"></i>
            <input type="text" id="locationSearch" placeholder="Search location (e.g., Rubaga, Nakawa)...">
        </div>

        <div class="filter-grid">
            <div class="filter-group">
                <label><i class="fa-solid(remove-space)-building"></i> Property Type</label>
                <select id="propertyType">
                    <option value="all">All Types</option>
                    <option value="Apartment">Apartment</option>
                    <option value="Bedsitter">Bedsitter</option>
                    <option value="Bungalow">Bungalow</option>
                    <option value="Studio Apartment">Studio Apartment</option>
                </select>
            </div>

            <div class="filter-group">
                <label><i class="fa-solid(remove-space)-hammer"></i> Condition</label>
                <select id="condition">
                    <option value="all">Any Condition</option>
                    <option value="Newly-Built">Newly-Built</option>
                    <option value="Renovated">Renovated</option>
                    <option value="Fairly Used">Fairly Used</option>
                </select>
            </div>

            <div class="filter-group">
                <label><i class="fa-solid(remove-space)-couch"></i> Furnishing</label>
                <select id="furnishing">
                    <option value="all">Any Furnishing</option>
                    <option value="Furnished">Furnished</option>
                    <option value="Semi-Furnished">Semi-Furnished</option>
                    <option value="Unfurnished">Unfurnished</option>
                </select>
            </div>
        </div>
        
        <button id="applyFiltersBtn" class="search-btn">Show Filtered Ads</button>
    </section>

    <main class="listings-container">
        <h2>Active Listings in Kampala</h2>
        <div id="listingsGrid" class="listings-grid">
            </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
